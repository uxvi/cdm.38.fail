<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project 2026 Tracker</title>
  <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico">
  <style>
    :root {
      --bg-top: #f8fafc;
      --bg-mid: #eef4ff;
      --bg-bottom: #ffffff;
      --text: #030122;
      --muted: #64748b;
      --line: #e2e8f0;
      --card: rgba(255, 255, 255, 0.88);
      --soft: #f8fafc;
      --shadow: 0 18px 56px rgba(15, 23, 42, 0.08);
      --blue-bg: #e0f2fe;
      --blue-text: #0369a1;
      --indigo-bg: #e0e7ff;
      --indigo-text: #4338ca;
      --slate-bg: #f1f5f9;
      --slate-text: #475569;
      --amber-bg: #fef3c7;
      --amber-text: #b45309;
      --green-bg: #15803d;
      --white-text: #ffffff;
      --bar-bg: #e2e8f0;
      --bar-fill: #8bcfff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow);
      padding: 36px;
      backdrop-filter: blur(12px);
    }

    .hero-grid {
      display: grid;
      gap: 28px;
      grid-template-columns: 1.6fr 1fr;
      align-items: end;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 7px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 18px 0 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .highlight {
      font-family: sans-serif;
      font-weight: bold;
      background-image: linear-gradient(to right, #030122, #3399ff, #8bcfff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      max-width: 720px;
      margin: 18px 0 0;
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--muted);
    }

    .summary-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, 1fr);
    }

    .stat {
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 18px;
    }

    .stat-label {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .stat-value {
      margin-top: 10px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    /* EDIT TOGGLE */
    .edit-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-edit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      background: var(--text);
      color: #fff;
      border: none;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }

    .btn-edit:hover {
      opacity: 0.8;
    }

    .btn-edit.active {
      background: #22c55e;
    }

    /* GOALS */
    .goals {
      display: grid;
      gap: 20px;
      margin-top: 20px;
    }

    .goal-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.07);
      padding: 26px;
      backdrop-filter: blur(10px);
      transition: box-shadow 0.2s;
    }

    .goal-card.editing {
      box-shadow: 0 0 0 2px #3399ff, 0 16px 48px rgba(15, 23, 42, 0.07);
    }

    .goal-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .goal-heading {
      flex: 1;
      min-width: 0;
    }

    .goal-label-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .goal-number {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--text);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .goal-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.25;
      letter-spacing: -0.03em;
    }

    .goal-description {
      margin: 10px 0 0;
      font-size: 0.98rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .goal-date {
      margin-top: 10px;
      font-size: 0.96rem;
      font-weight: 600;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .badge.in-progress {
      background: var(--blue-bg);
      color: var(--blue-text);
    }

    .badge.ongoing {
      background: var(--indigo-bg);
      color: var(--indigo-text);
    }

    .badge.planned {
      background: var(--slate-bg);
      color: var(--slate-text);
    }

    .badge.scheduled {
      background: var(--amber-bg);
      color: var(--amber-text);
    }

    .badge.completed {
      background: var(--green-bg);
      color: var(--white-text);
    }

    .note {
      margin-top: 16px;
      background: var(--soft);
      border: 1px dashed var(--line);
      padding: 16px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .subtrackers {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .subtracker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: rgba(248, 250, 252, 0.92);
      border: 1px solid var(--line);
      padding: 16px;
    }

    .subtracker-meta {
      min-width: 0;
      flex: 1;
    }

    .subtracker-label {
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .subtracker-name {
      margin-top: 6px;
      font-size: 1rem;
      font-weight: 600;
      color: #1e293b;
    }

    .progress-wrap {
      width: min(100%, 360px);
      flex-shrink: 0;
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      font-size: 0.8rem;
      color: var(--muted);
      padding-right: 56px;
    }

    .progress-bar {
      width: 100%;
      flex: 1;
      height: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--bar-bg);
    }

    .progress-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-current {
      min-width: 46px;
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      flex-shrink: 0;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--bar-fill);
    }

    .check-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 180px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 700;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #cbd5e1;
    }

    .check.done {
      border-color: #22c55e;
      background: #22c55e;
      color: #fff;
    }

    .check-status {
      font-size: 0.92rem;
      color: var(--muted);
    }

    /* EDIT CONTROLS */
    .edit-controls {
      margin-top: 20px;
      border-top: 1px dashed var(--line);
      padding-top: 18px;
      display: none;
    }

    .edit-controls.visible {
      display: block;
    }

    .edit-grid {
      display: grid;
      gap: 12px;
    }

    .edit-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .edit-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      min-width: 90px;
    }

    .edit-input,
    .edit-select,
    .edit-textarea {
      flex: 1;
      min-width: 180px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .edit-input:focus,
    .edit-select:focus,
    .edit-textarea:focus {
      border-color: #3399ff;
    }

    .edit-textarea {
      resize: vertical;
      min-height: 60px;
    }

    .edit-section-title {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 14px 0 8px;
    }

    .sub-edit {
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 14px;
      display: grid;
      gap: 8px;
      position: relative;
    }

    .sub-edit-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-small {
      padding: 5px 12px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-small:hover {
      background: var(--line);
    }

    .btn-small.danger {
      border-color: #fca5a5;
      color: #dc2626;
    }

    .btn-small.danger:hover {
      background: #fee2e2;
    }

    .btn-add-sub {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px dashed var(--line);
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--muted);
      margin-top: 6px;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-add-sub:hover {
      border-color: #3399ff;
      color: #3399ff;
    }

    .progress-edit-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      min-width: 180px;
    }

    .progress-edit-wrap input[type=range] {
      flex: 1;
    }

    .progress-edit-wrap span {
      min-width: 38px;
      text-align: right;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .check-toggle {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .check-toggle label {
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 980px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 22px 14px 40px;
      }

      .hero,
      .goal-card {
        padding: 20px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .goal-top,
      .subtracker {
        flex-direction: column;
        align-items: flex-start;
      }

      .progress-wrap,
      .check-wrap {
        width: 100%;
        min-width: 0;
        justify-content: flex-start;
      }

      .goal-title {
        font-size: 1.25rem;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="hero">
      <div class="hero-grid">
        <div>
          <div class="eyebrow">yodabird/savster</div>
          <h1>Project 2026 Tracker</h1>
          <p>A <a href="https://discord.gg/aKqx8BNUpR" target="_blank" class="highlight">Cortesian</a> community effort
            to track the current administration's infrastructure, legislation, and policy commitments across Alenarith
            and beyond.</p>
        </div>
        <div class="summary-grid">
          <div class="stat">
            <div class="stat-label">Promises made</div>
            <div class="stat-value" id="stat-total">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total progress</div>
            <div class="stat-value" id="stat-progress">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Completed goals</div>
            <div class="stat-value" id="stat-completed">—</div>
          </div>
        </div>
      </div>
    </header>

    <main class="goals" id="goals-container"></main>
  </div>

  <script>
    // GOALS DATA — edit this array to update the tracker
    const goals = [
      {
        title: "Fill 70% of Montefiore's trench interior with builds",
        description: "See to it that 70% of the surface area inside of the trench is covered in structures at or near their final state",
        status: "in-progress",
        date: null,
        note: null,
        subtrackers: [
          { type: "progress", label: "Build coverage", starting: 40, current: 68, target: 70 }
        ]
      },
      {
        title: "Draft and pass a Montefiore City Act",
        description: "Give Montefiore local a local governing council, imitating the Setra Maria model, with the power to enact local ordinances",
        status: "in-progress",
        date: null,
        note: null,
        subtrackers: [
          { type: "check", label: "Final draft completed", done: false },
          { type: "check", label: "Passed National Forum", done: false }
        ]
      },
      {
        title: "Encourage the private sector",
        description: "Implement several policy proposals aimed at increasing private sector activity in Montefiore, enumerated below",
        status: "completed",
        date: null,
        note: null,
        subtrackers: [
          { type: "check", label: "Labor Notes programs", done: true },
          { type: "check", label: "Shop space", done: true },
          { type: "check", label: "Liquidity programs", done: true }
        ]
      },
      {
        title: "Invite Cortesia's neighbors to benefit from Montefiore as a regional economic center",
        description: "Project 2026 particularly identifies Danzilona, Nara, and the Temporal Empire as desirable future trade partners for Cortesia Del Mar",
        status: "planned",
        date: null,
        note: "No concrete objectives yet established. This space will be updated when concrete objectives are announced for this goal.",
        subtrackers: []
      },
      {
        title: "Establish an incentives package for large companies to open shops in Montefiore",
        description: "Offer rewards to recognizable international brands to open branches in Montefiore, such as a monthly benefits payment",
        status: "planned",
        date: null,
        note: null,
        subtrackers: []
      },
      {
        title: "Host a public ceremony in Montefiore on May 31, 2026",
        description: "Project 2026 calls for a ceremony 'to publicize and debut Montefiore as a mature city before the whole of CivMC' on the first anniversary of construction beginning on the city",
        status: "scheduled",
        date: "May 31, 2026",
        note: null,
        subtrackers: []
      },
      {
        title: "Cover the entire surface of Santiago & Castelia in jukebox snitches",
        description: "Establish a complete jukesnitch grid over the Iaumean twin cities, involving the placement of some 500-600 jukeboxes",
        status: "in-progress",
        date: null,
        note: null,
        subtrackers: [
          { type: "progress", label: "Santiago", starting: 0, current: 0, target: 100 },
          { type: "progress", label: "Castelia", starting: 0, current: 100, target: 100 }
        ]
      },
      {
        title: "Construct bastioned city bunkers in Santiago & Castelia",
        description: "These bunkers would serve dual purposes as secure wealth storages and kite points for city residents and security personnel",
        status: "in-progress",
        date: null,
        note: null,
        subtrackers: [
          { type: "check", label: "Santiago", done: false },
          { type: "check", label: "Castelia", done: true }
        ]
      },
      {
        title: "Establish iron/diamond and ore exchanges in Santiago",
        description: "These exchanges would imitate ones already operational in Montefiore",
        status: "completed",
        date: null,
        note: null,
        subtrackers: [
          { type: "check", label: "Iron/Diamond Exchange", done: true },
          { type: "check", label: "Ore Exchange", done: true }
        ]
      },
      {
        title: "Connect Santiago to the GOR",
        description: "A connection to the Yoahtlan-owned international railway system was already partially built to Santiago during Iaumean rule; the yodabird19 administration intends to complete it and bring it online",
        status: "planned",
        date: null,
        note: null,
        subtrackers: []
      },
      {
        title: "Construct rail stations in Aldenfult",
        description: "Give the Arsenio region's oldest city railway capacity which it currently does not have",
        status: "in-progress",
        date: null,
        note: null,
        subtrackers: [
          { type: "check", label: "Overland", done: true },
          { type: "check", label: "Underground", done: false }
        ]
      },
      {
        title: "Montefiore-Dubrovnik rail connection",
        description: "Construct and operationalize an international railway connection to the Temporal Empire's capital city",
        status: "completed",
        date: null,
        note: null,
        subtrackers: []
      },
      {
        title: "Scatter small military kite points across CDM",
        description: "The proposed military kite points would connect to Cortesian iceroads, being usable both for rapid surface access and defender escapes",
        status: "in-progress",
        date: null,
        note: null,
        subtrackers: [
          { type: "progress", label: "Arsenio", starting: 0, current: 50, target: 100 },
          { type: "progress", label: "Iaumea", starting: 0, current: 0, target: 100 }
        ]
      },
      {
        title: "Develop the Deep Blue snitch system",
        description: "'Deep Blue' is a proposed snitchbot that would give Cortesia the capacity to host and configure complex snitch relays independently of any international provider",
        status: "completed",
        date: null,
        note: null,
        subtrackers: []
      },
      {
        title: "Put an XP plan on the National Forum floor",
        description: "Project 2026 calls for a 'concrete, actionable plan for the development of XP infrastructure' to be compiled and published before the end of the term",
        status: "planned",
        date: null,
        note: null,
        subtrackers: []
      },
      {
        title: '"Pocket" versions of all law and precedents',
        description: "Publish abridged versions of all operational Cortesian law and court precedent, with the aim of increasing accessibility and participation of the legal system",
        status: "completed",
        date: null,
        note: null,
        subtrackers: [
          { type: "check", label: "Constitution", done: true },
          { type: "progress", label: "Laws", starting: 0, current: 100, target: 100 },
          { type: "progress", label: "Court precedents", starting: 0, current: 100, target: 100 }
        ]
      }
    ];

    const STATUS_OPTIONS = [
      { value: "in-progress", label: "In Progress" },
      { value: "ongoing", label: "Ongoing" },
      { value: "planned", label: "Planned" },
      { value: "scheduled", label: "Scheduled" },
      { value: "completed", label: "Completed" }
    ];

    const STATUS_LABELS = {
      "in-progress": "In progress",
      "ongoing": "Ongoing",
      "planned": "Planned",
      "scheduled": "Scheduled",
      "completed": "Completed"
    };

    let editMode = false;

    function computeStats() {
      const total = goals.length;
      let completedGoals = 0;
      let totalGoalProgress = 0;
      let goalCount = 0;

      goals.forEach(g => {
        goalCount++;

        let goalComplete = false;
        if (g.subtrackers.length === 0) {
          goalComplete = (g.status === "completed");
        } else {
          const allDone = g.subtrackers.every(s => {
            if (s.type === "check") return s.done;
            if (s.type === "progress") return s.current >= s.target;
            return false;
          });
          if (allDone) goalComplete = true;
        }
        if (goalComplete) completedGoals++;

        if (g.subtrackers.length > 0) {
          let subCount = 0;
          let totalSubProgress = 0;
          g.subtrackers.forEach(s => {
            if (s.type === "progress") {
              totalSubProgress += Math.min((s.current - s.starting) / (s.target - s.starting), 1) * 100;
              subCount++;
            } else if (s.type === "check") {
              totalSubProgress += s.done ? 100 : 0;
              subCount++;
            }
          });
          totalGoalProgress += (totalSubProgress / subCount);
        } else {
          totalGoalProgress += (goalComplete ? 100 : 0);
        }
      });

      const overallProgress = goalCount > 0 ? Math.round(totalGoalProgress / goalCount) : 0;

      document.getElementById("stat-total").textContent = total;
      document.getElementById("stat-progress").textContent = overallProgress + "%";
      document.getElementById("stat-completed").textContent = completedGoals + "/" + total;
    }

    function render() {
      const container = document.getElementById("goals-container");
      container.innerHTML = "";

      goals.forEach((goal, gi) => {
        const card = document.createElement("section");
        card.className = "goal-card" + (editMode ? " editing" : "");

        let subtrackerHTML = "";
        if (goal.subtrackers.length > 0) {
          subtrackerHTML = '<div class="subtrackers">';
          goal.subtrackers.forEach(s => {
            if (s.type === "progress") {
              const pct = s.target > s.starting ? Math.min((s.current - s.starting) / (s.target - s.starting), 1) * 100 : 0;
              subtrackerHTML += `
            <div class="subtracker">
              <div class="subtracker-meta">
                <div class="subtracker-label">Sub-tracker</div>
                <div class="subtracker-name">${escHtml(s.label)}</div>
              </div>
              <div class="progress-wrap">
              ${s.starting > 0
                  ? `<div class="progress-top"><span>${s.starting}% initial</span><span>${s.target}% target</span></div>`
                  : `<div class="progress-top"><span></span><span>${s.target}% target</span></div>`}
                <div class="progress-bar-row">
                  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                  <div class="progress-current">${s.current}%</div>
                </div>
              </div>
            </div>`;
            } else {
              subtrackerHTML += `
            <div class="subtracker">
              <div class="subtracker-meta">
                <div class="subtracker-label">Sub-tracker</div>
                <div class="subtracker-name">${escHtml(s.label)}</div>
              </div>
              <div class="check-wrap">
                <div class="check ${s.done ? "done" : ""}">✓</div>
                <div class="check-status">${s.done ? "Completed" : "Pending"}</div>
              </div>
            </div>`;
            }
          });
          subtrackerHTML += "</div>";
        }

        let editHTML = "";
        if (editMode) {
          let subEditFields = "";
          goal.subtrackers.forEach((s, si) => {
            if (s.type === "progress") {
              subEditFields += `
            <div class="sub-edit" id="sub-${gi}-${si}">
              <div class="sub-edit-row">
                <span class="edit-label">Label</span>
                <input class="edit-input" value="${escAttr(s.label)}" oninput="updateSub(${gi},${si},'label',this.value)" />
                <span class="edit-label" style="min-width:50px">Type</span>
                <select class="edit-select" style="flex:0;min-width:120px" onchange="updateSub(${gi},${si},'type',this.value)">
                  <option value="progress" selected>Progress</option>
                  <option value="check">Checkbox</option>
                </select>
                <button class="btn-small danger" onclick="removeSub(${gi},${si})">Remove</button>
              </div>
              <div class="sub-edit-row">
                <span class="edit-label">Current</span>
                <div class="progress-edit-wrap">
                  <input type="range" min="${s.starting}" max="${s.target}" value="${s.current}" oninput="updateSub(${gi},${si},'current',+this.value);this.nextElementSibling.textContent=this.value+'%'" />
                  <span>${s.current}%</span>
                </div>
                <span class="edit-label" style="min-width:50px">Target</span>
                <input class="edit-input" style="max-width:80px" type="number" min="1" max="100" value="${s.target}" oninput="updateSub(${gi},${si},'target',+this.value)" />
              </div>
            </div>`;
            } else {
              subEditFields += `
            <div class="sub-edit" id="sub-${gi}-${si}">
              <div class="sub-edit-row">
                <span class="edit-label">Label</span>
                <input class="edit-input" value="${escAttr(s.label)}" oninput="updateSub(${gi},${si},'label',this.value)" />
                <span class="edit-label" style="min-width:50px">Type</span>
                <select class="edit-select" style="flex:0;min-width:120px" onchange="updateSub(${gi},${si},'type',this.value)">
                  <option value="progress">Progress</option>
                  <option value="check" selected>Checkbox</option>
                </select>
                <button class="btn-small danger" onclick="removeSub(${gi},${si})">Remove</button>
              </div>
              <div class="sub-edit-row check-toggle">
                <span class="edit-label">Status</span>
                <label><input type="checkbox" ${s.done ? "checked" : ""} onchange="updateSub(${gi},${si},'done',this.checked)" /> Completed</label>
              </div>
            </div>`;
            }
          });

          editHTML = `
        <div class="edit-controls visible">
          <div class="edit-grid">
            <div class="edit-row">
              <span class="edit-label">Title</span>
              <input class="edit-input" value="${escAttr(goal.title)}" oninput="updateGoal(${gi},'title',this.value)" />
            </div>
            <div class="edit-row">
              <span class="edit-label">Description</span>
              <textarea class="edit-textarea" oninput="updateGoal(${gi},'description',this.value||null)">${escHtml(goal.description || '')}</textarea>
            </div>
            <div class="edit-row">
              <span class="edit-label">Status</span>
              <select class="edit-select" onchange="updateGoal(${gi},'status',this.value)">
                ${STATUS_OPTIONS.map(o => `<option value="${o.value}"${goal.status === o.value ? " selected" : ""}>${o.label}</option>`).join("")}
              </select>
              <span class="edit-label" style="min-width:60px">Date</span>
              <input class="edit-input" placeholder="e.g. May 31, 2026" value="${escAttr(goal.date || '')}" oninput="updateGoal(${gi},'date',this.value||null)" />
            </div>
            <div class="edit-row">
              <span class="edit-label">Note</span>
              <textarea class="edit-textarea" oninput="updateGoal(${gi},'note',this.value||null)">${escHtml(goal.note || '')}</textarea>
            </div>
          </div>
          <div class="edit-section-title">Sub-trackers</div>
          <div id="subs-${gi}">${subEditFields}</div>
          <button class="btn-add-sub" onclick="addSub(${gi})">＋ Add sub-tracker</button>
        </div>`;
        }

        const num = String(gi + 1).padStart(2, "0");
        card.innerHTML = `
      <div class="goal-top">
        <div class="goal-heading">
          <div class="goal-label-row">
            <div class="goal-number">${num}</div>
            <div class="badge ${goal.status}">${STATUS_LABELS[goal.status] || goal.status}</div>
          </div>
          <h2 class="goal-title">${escHtml(goal.title)}</h2>
          ${goal.description ? `<p class="goal-description">${escHtml(goal.description)}</p>` : ""}
          ${goal.date ? `<div class="goal-date">Target date: ${escHtml(goal.date)}</div>` : ""}
          ${goal.note ? `<div class="note">${escHtml(goal.note)}</div>` : ""}
        </div>
      </div>
      ${subtrackerHTML}
      ${editHTML}`;

        container.appendChild(card);
      });

      computeStats();
    }

    function toggleEditMode() {
      editMode = !editMode;
      const btn = document.getElementById("global-edit-btn");
      btn.textContent = editMode ? "✓ Done Editing" : "✏️ Edit Goals";
      btn.classList.toggle("active", editMode);
      render();
    }

    function updateGoal(gi, key, value) {
      goals[gi][key] = value;
      computeStats();
      const card = document.getElementById("goals-container").children[gi];
      const num = String(gi + 1).padStart(2, "0");
      const g = goals[gi];
      const heading = card.querySelector(".goal-heading");

      card.querySelector(".goal-number").textContent = num;
      card.querySelector(".badge").className = `badge ${g.status}`;
      card.querySelector(".badge").textContent = STATUS_LABELS[g.status] || g.status;
      card.querySelector(".goal-title").textContent = g.title;

      let descEl = card.querySelector(".goal-description");
      if (g.description) {
        if (!descEl) {
          descEl = document.createElement("p");
          descEl.className = "goal-description";
          card.querySelector(".goal-title").insertAdjacentElement("afterend", descEl);
        }
        descEl.textContent = g.description;
      } else if (descEl) {
        descEl.remove();
      }

      let dateEl = card.querySelector(".goal-date");
      if (g.date) {
        if (!dateEl) {
          dateEl = document.createElement("div");
          dateEl.className = "goal-date";
          heading.appendChild(dateEl);
        }
        dateEl.textContent = "Target date: " + g.date;
      } else if (dateEl) {
        dateEl.remove();
      }

      let noteEl = card.querySelector(".note");
      if (g.note) {
        if (!noteEl) {
          noteEl = document.createElement("div");
          noteEl.className = "note";
          heading.appendChild(noteEl);
        }
        noteEl.textContent = g.note;
      } else if (noteEl) {
        noteEl.remove();
      }
    }

    function updateSub(gi, si, key, value) {
      goals[gi].subtrackers[si][key] = value;
      if (key === "type") {
        if (value === "progress") {
          goals[gi].subtrackers[si] = { type: "progress", label: goals[gi].subtrackers[si].label, starting: 0, current: 0, target: 100 };
        } else {
          goals[gi].subtrackers[si] = { type: "check", label: goals[gi].subtrackers[si].label, done: false };
        }
        render();
        return;
      }
      computeStats();
      refreshSubtrackersView(gi);
    }

    function addSub(gi) {
      goals[gi].subtrackers.push({ type: "check", label: "New item", done: false });
      render();
    }

    function removeSub(gi, si) {
      goals[gi].subtrackers.splice(si, 1);
      render();
    }

    function refreshSubtrackersView(gi) {
      const card = document.getElementById("goals-container").children[gi];
      const g = goals[gi];
      let existingView = card.querySelector(".subtrackers");

      if (g.subtrackers.length === 0) {
        if (existingView) existingView.remove();
        return;
      }

      let html = "";
      g.subtrackers.forEach(s => {
        if (s.type === "progress") {
          const pct = s.target > s.starting ? Math.min((s.current - s.starting) / (s.target - s.starting), 1) * 100 : 0;
          html += `<div class="subtracker">
        <div class="subtracker-meta"><div class="subtracker-label">Sub-tracker</div><div class="subtracker-name">${escHtml(s.label)}</div></div>
        <div class="progress-wrap">
          ${s.starting > 0
              ? `<div class="progress-top"><span>${s.starting}% initial</span><span>${s.target}% target</span></div>`
              : `<div class="progress-top"><span></span><span>${s.target}% target</span></div>`}
          <div class="progress-bar-row"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-current">${s.current}%</div></div>
        </div></div>`;
        } else {
          html += `<div class="subtracker">
        <div class="subtracker-meta"><div class="subtracker-label">Sub-tracker</div><div class="subtracker-name">${escHtml(s.label)}</div></div>
        <div class="check-wrap"><div class="check ${s.done ? "done" : ""}">✓</div><div class="check-status">${s.done ? "Completed" : "Pending"}</div></div>
        </div>`;
        }
      });

      if (existingView) {
        existingView.innerHTML = html;
      } else {
        const wrap = document.createElement("div");
        wrap.className = "subtrackers";
        wrap.innerHTML = html;
        const editCtrl = card.querySelector(".edit-controls");
        if (editCtrl) card.insertBefore(wrap, editCtrl);
        else card.appendChild(wrap);
      }
    }

    function escHtml(str) {
      if (!str) return "";
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function escAttr(str) {
      if (!str) return "";
      return String(str).replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    render();
  </script>
</body>

</html>
